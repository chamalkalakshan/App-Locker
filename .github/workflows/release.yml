name: Build & Release APK

# Triggered when you push a version tag, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The workflow:
#   1. Builds a signed release APK using secrets stored in GitHub.
#   2. Creates a GitHub Release named after the tag.
#   3. Uploads the APK as a release asset named App-Locker-vX.X.X.apk.
#
# APK files are NEVER committed to the repository — they live only as
# GitHub Release assets.  See DISTRIBUTION.md for the full signing guide.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Decode the release keystore from a base64 secret ──────────────────
      #
      # Store your keystore as a base64 string in GitHub Secrets:
      #   base64 -w 0 release.keystore > keystore.b64   (Linux/macOS)
      #   [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore")) | clip  (PowerShell)
      # Then add the output as secret KEYSTORE_BASE64 in:
      #   GitHub repo → Settings → Secrets and variables → Actions
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # ── 4. Write keystore.properties ─────────────────────────────────────────
      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # ── 6. Build signed release APK ──────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 7. Rename the APK to include the version tag ─────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp app/build/outputs/apk/release/app-release.apk \
             "App-Locker-${VERSION}.apk"
          echo "APK_NAME=App-Locker-${VERSION}.apk" >> $GITHUB_ENV

      # ── 8. Create GitHub Release and upload APK ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "App Locker ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.APK_NAME }}
          body: |
            ## App Locker ${{ github.ref_name }}

            ### Download
            Download the APK below: **`${{ env.APK_NAME }}`**

            ### Installation
            1. Download the APK file below.
            2. Transfer it to your Android device if needed.
            3. Tap the file to install (allow "Install from unknown sources" when prompted).
            4. If Play Protect blocks the install, see the README for instructions.
            5. Open App Locker, follow the onboarding, enable the Accessibility Service, and set your PIN.

            ### Play Protect Note
            Because this app uses AccessibilityService, sideloaded APKs may trigger a
            Google Play Protect warning. The app is open-source — you can review the source
            code before installing. See [PRIVACY.md](PRIVACY.md) for the full privacy policy.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Clean up keystore from runner ─────────────────────────────────────
      - name: Remove keystore from runner
        if: always()
        run: |
          rm -f release.keystore keystore.properties
